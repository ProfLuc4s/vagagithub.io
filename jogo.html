<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória - Simpsons</title>
    <!-- Carrega o Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos personalizados para o efeito de virar a carta */
        
        /* O contêiner da carta precisa de perspectiva */
        .card {
            background-color: transparent;
            width: 100%; /* Largura total do contêiner grid */
            aspect-ratio: 1 / 1; /* Mantém a carta quadrada */
            perspective: 1000px;
            cursor: pointer;
        }

        /* Este contêiner faz a animação de virar */
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        /* Quando a carta está virada */
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* Quando a carta deu "match", fica virada e sem cursor */
        .card.matched {
            cursor: default;
        }

        /* As duas faces da carta */
        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden; /* Safari */
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 0.5rem; /* rounded-lg */
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); /* shadow-md */
        }

        /* Verso da carta (o que você vê primeiro) */
        .card-back {
            background-color: #f59e0b; /* amber-500 */
            color: white;
            font-size: 3rem; /* text-5xl */
            font-weight: bold;
        }

        /* Frente da carta (a imagem) */
        .card-front {
            background-color: #f3f4f6; /* gray-100 */
            transform: rotateY(180deg);
        }
        
        .card-front img {
            width: 90%;
            height: 90%;
            object-fit: contain; /* Garante que a imagem caiba sem distorcer */
            border-radius: 0.25rem; /* rounded-sm */
        }

        /* Estilo para a mensagem de vitória */
        #win-message {
            transition: opacity 0.5s;
        }
    </style>
</head>
<body class="bg-gray-900 flex flex-col items-center justify-center min-h-screen font-sans p-4" style="font-family: 'Inter', sans-serif;">

    <h1 class="text-4xl font-bold text-yellow-400 mb-6 text-center">Jogo da Memória - Simpsons</h1>

    <!-- Contêiner principal do jogo -->
    <main class="w-full max-w-2xl mx-auto">
        
        <!-- O tabuleiro do jogo -->
        <div id="game-board" class="grid grid-cols-4 gap-3 md:gap-4">
            <!-- As cartas serão geradas pelo JavaScript aqui -->
        </div>

        <!-- Mensagem de vitória (oculta inicialmente) -->
        <div id="win-message" class="text-center text-green-400 text-2xl font-bold mt-6 opacity-0">
            Você encontrou todos os pares!
        </div>

        <!-- Botão de Reiniciar -->
        <div class="text-center mt-6">
            <button id="reset-button" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transition duration-300 ease-in-out transform hover:scale-105">
                Reiniciar Jogo
            </button>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gameBoard = document.getElementById('game-board');
            const resetButton = document.getElementById('reset-button');
            const winMessage = document.getElementById('win-message');

            // URLs das imagens fornecidas
            const imageUrls = [
                'https://upload.wikimedia.org/wikipedia/pt/0/02/Homer_Simpson_2006.png',
                'https://s2.glbimg.com/qe_urvzQIV_aelAf8FNYuofNYuA=/top/e.glbimg.com/og/ed/f/original/2013/11/29/simpsons_01.jpg',
                'https://i.ebayimg.com/images/g/vsgAAOSwPSpnQdon/s-l400.png',
                'https://static.wikia.nocookie.net/dublagem/images/8/86/Bart.png/revision/latest?cb=20210627221347&path-prefix=pt-br',
                'https://static.wikia.nocookie.net/simpsons/images/a/af/Marge_Simpson_avat0.png/revision/latest?cb=20161125001039&path-prefix=pt',
                'https://i.pinimg.com/originals/c7/d6/d3/c7d6d320e499118edf0abf5ce32d9e2d.jpg'
            ];

            // Duplicar as imagens para formar os pares
            let cardImages = [...imageUrls, ...imageUrls];

            let firstCard = null;
            let secondCard = null;
            let lockBoard = false; // Trava o tabuleiro para evitar 3 cliques
            let matchedPairs = 0;

            // Função para embaralhar o array
            function shuffle(array) {
                array.sort(() => 0.5 - Math.random());
            }

            // Função para criar o tabuleiro
            function createBoard() {
                // Reseta o estado do jogo
                gameBoard.innerHTML = '';
                winMessage.classList.add('opacity-0');
                firstCard = null;
                secondCard = null;
                lockBoard = false;
                matchedPairs = 0;

                // Embaralha as cartas
                shuffle(cardImages);

                // URL de placeholder em caso de erro na imagem
                const placeholderUrl = (size) => `https://placehold.co/${size}x${size}/f59e0b/ffffff?text=?`;

                // Cria os elementos das cartas
                cardImages.forEach(imageUrl => {
                    const card = document.createElement('div');
                    card.classList.add('card');
                    card.dataset.image = imageUrl; // Armazena a URL da imagem no dataset

                    card.innerHTML = `
                        <div class="card-inner">
                            <div class="card-back">
                                <span>?</span>
                            </div>
                            <div class="card-front">
                                <img src="${imageUrl}" 
                                     alt="Personagem dos Simpsons" 
                                     onerror="this.onerror=null; this.src='${placeholderUrl(100)}';">
                            </div>
                        </div>
                    `;

                    card.addEventListener('click', flipCard);
                    gameBoard.appendChild(card);
                });
            }

            // Função principal para virar a carta
            function flipCard() {
                if (lockBoard) return; // Se o tabuleiro estiver travado, ignora o clique
                if (this === firstCard) return; // Ignora clique na mesma carta

                this.classList.add('flipped');

                if (!firstCard) {
                    // Primeiro clique
                    firstCard = this;
                    return;
                }

                // Segundo clique
                secondCard = this;
                lockBoard = true; // Trava o tabuleiro

                checkForMatch();
            }

            // Verifica se as duas cartas viradas são iguais
            function checkForMatch() {
                const isMatch = firstCard.dataset.image === secondCard.dataset.image;

                if (isMatch) {
                    disableCards();
                } else {
                    unflipCards();
                }
            }

            // Se deu "match", desabilita as cartas
            function disableCards() {
                firstCard.classList.add('matched');
                secondCard.classList.add('matched');

                // Remove o evento de clique para não poderem ser viradas novamente
                firstCard.removeEventListener('click', flipCard);
                secondCard.removeEventListener('click', flipCard);
                
                matchedPairs++;
                resetBoard();

                // Verifica se o jogo acabou
                if (matchedPairs === imageUrls.length) {
                    setTimeout(() => {
                        winMessage.classList.remove('opacity-0');
                    }, 500); // Mostra a mensagem de vitória
                }
            }

            // Se não deu "match", vira as cartas de volta
            function unflipCards() {
                setTimeout(() => {
                    firstCard.classList.remove('flipped');
                    secondCard.classList.remove('flipped');
                    resetBoard();
                }, 1000); // Espera 1 segundo antes de virar
            }

            // Reseta as variáveis de estado
            function resetBoard() {
                [firstCard, secondCard, lockBoard] = [null, null, false];
            }

            // Event listener do botão de reiniciar
            resetButton.addEventListener('click', createBoard);

            // Inicia o jogo pela primeira vez
            createBoard();
        });
    </script>
</body>
</html>
